<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrimonio Mensual</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:#0f172a;
margin:0;
padding:20px;
color:#1e293b;
}

.container{
max-width:520px;
margin:auto;
}

/* TARJETA PRINCIPAL */

.balance-card{
background:linear-gradient(135deg,#1e293b,#334155);
border-radius:20px;
padding:30px;
color:white;
margin-bottom:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

.balance-title{
font-size:14px;
opacity:0.7;
margin-bottom:10px;
}

.total{
font-size:40px;
font-weight:700;
letter-spacing:-1px;
}

.small{
margin-top:8px;
font-size:14px;
}

.positive{ color:#4ade80; }
.negative{ color:#f87171; }
.neutral{ color:#cbd5f5; }

/* TARJETAS */

.card{
background:white;
padding:22px;
border-radius:18px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* INPUTS */

label{
font-size:12px;
font-weight:600;
color:#64748b;
}

input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:14px;
border-radius:10px;
border:1px solid #e2e8f0;
font-size:15px;
background:#f8fafc;
}

input:focus{
outline:none;
border-color:#3b82f6;
background:white;
}

/* CUENTAS */

.accounts{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

/* BOTON */

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#1e293b,#334155);
color:white;
font-weight:600;
font-size:15px;
cursor:pointer;
transition:all 0.15s ease;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 6px 16px rgba(0,0,0,0.25);
}

/* GRAFICO */

.chart-card{
padding-top:15px;
}

.chart-title{
font-size:14px;
font-weight:600;
margin-bottom:10px;
color:#334155;
}

.month-row{
margin-bottom:18px;
}

.accounts{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
margin-bottom:20px;
}

.account:nth-child(3){
grid-column:1 / span 2;
}

.account input{
font-size:16px;
font-weight:500;
padding:14px;
}

.account input::placeholder{
color:#94a3b8;
}

button{
margin-top:5px;
}

.accounts{
display:flex;
flex-direction:column;
gap:12px;
margin-bottom:20px;
}

.account-card{
background:#f8fafc;
border-radius:14px;
padding:14px;
display:flex;
flex-direction:column;
cursor:pointer;
transition:all 0.15s ease;
border:1px solid #e2e8f0;
}

.account-card:hover{
background:#f1f5f9;
}

.account-left{
display:flex;
align-items:center;
gap:12px;
}

.account-icon{
font-size:20px;
}

.account-name{
font-weight:600;
font-size:14px;
}

.account-balance{
font-size:13px;
color:#64748b;
}

.accounts{
display:flex;
flex-direction:column;
gap:12px;
margin-bottom:20px;
}

.account-row{
display:flex;
align-items:center;
justify-content:space-between;
background:#f8fafc;
border:1px solid #e2e8f0;
border-radius:14px;
padding:12px 14px;
}

.account-info{
display:flex;
align-items:center;
gap:10px;
}

.account-icon{
font-size:18px;
}

.account-name{
font-weight:600;
font-size:14px;
}

.account-input{
width:120px;
text-align:right;
font-size:16px;
font-weight:600;
border:none;
background:transparent;
}

.account-input:focus{
outline:none;
}

.month-selector{
display:flex;
align-items:center;
justify-content:center;
gap:20px;
margin-bottom:20px;
}

.month-display{
font-size:18px;
font-weight:600;
color:#1e293b;
}

.month-btn{
background:#f1f5f9;
border:none;
border-radius:10px;
width:36px;
height:36px;
font-size:18px;
cursor:pointer;
}

.month-btn:hover{
background:#e2e8f0;
}

</style>
</head>
<body>

<div class="container">

<div class="balance-card">

<div class="balance-title">Patrimonio total</div>
<div class="total" id="total">0 €</div>
<div class="small neutral" id="difference">Sin datos previos</div>

</div>


<div class="card">

<div class="month-selector">

<button class="month-btn" onclick="changeMonth(-1)">‹</button>

<div class="month-display" id="monthDisplay"></div>

<button class="month-btn" onclick="changeMonth(1)">›</button>

<input type="month" id="monthPicker" style="display:none">

</div>

<div class="accounts">

<div class="account-row">
<div class="account-info">
<div class="account-icon">💳</div>
<div class="account-name">Albert CX</div>
</div>
<input type="number" id="c1" class="account-input" placeholder="0">
</div>

<div class="account-row">
<div class="account-info">
<div class="account-icon">💳</div>
<div class="account-name">Albert DB</div>
</div>
<input type="number" id="c2" class="account-input" placeholder="0">
</div>

<div class="account-row">
<div class="account-info">
<div class="account-icon">💳</div>
<div class="account-name">Cris CX</div>
</div>
<input type="number" id="c3" class="account-input" placeholder="0">
</div>

</div>

<button onclick="saveMonth()">GUARDAR</button>

</div>


<div class="card chart-card">

<div class="chart-title">Evolución del patrimonio</div>
<canvas id="chart"></canvas>

</div>

</div>

</body>

<script>
let data = JSON.parse(localStorage.getItem("monthlyData")) || {};

const monthPicker = document.getElementById("monthPicker");
const c1 = document.getElementById("c1");
const c2 = document.getElementById("c2");
const c3 = document.getElementById("c3");

monthPicker.value = new Date().toISOString().slice(0,7);

function saveMonth(){

    const month = monthPicker.value;

    const v1 = parseFloat(c1.value) || 0;
    const v2 = parseFloat(c2.value) || 0;
    const v3 = parseFloat(c3.value) || 0;

    data[month] = {
        c1: v1,
        c2: v2,
        c3: v3
    };

    localStorage.setItem("monthlyData", JSON.stringify(data));

    render();

    // limpiar campos después de guardar
    c1.value = "";
    c2.value = "";
    c3.value = "";
}

function render(){
    const selectedMonth = monthPicker.value;
    const totalEl = document.getElementById("total");
    const diffEl = document.getElementById("difference");

    if(!data[selectedMonth]){
        totalEl.textContent="0 €";
        diffEl.textContent="Mes no registrado";
        diffEl.className="small neutral";
        renderChart();
        return;
    }

    const currentTotal = getTotal(selectedMonth);
    totalEl.textContent=currentTotal.toFixed(2)+" €";

    const sortedMonths = Object.keys(data).sort();
    const index = sortedMonths.indexOf(selectedMonth);

    if(index>0){
        const previousTotal = getTotal(sortedMonths[index-1]);
        const diff = currentTotal - previousTotal;

        diffEl.textContent=
            (diff>=0?"+":"")+diff.toFixed(2)+" € respecto al mes anterior";

        diffEl.className="small "+(diff>0?"positive":diff<0?"negative":"neutral");
    } else {
        diffEl.textContent="Sin mes anterior registrado";
        diffEl.className="small neutral";
    }

    renderChart();
}

function getTotal(month){
    if(!data[month]) return 0;

    return (
        (data[month].c1 || 0) +
        (data[month].c2 || 0) +
        (data[month].c3 || 0)
    );
}

function editAccount(id){

const input = document.getElementById(id);

if(input.style.display === "block"){
input.style.display = "none";
}else{
input.style.display = "block";
input.focus();
}

}

function updateMonthDisplay(){

const date = new Date(monthPicker.value);

const options = { month: 'long', year: 'numeric' };

document.getElementById("monthDisplay").textContent =
date.toLocaleDateString("es-ES", options);

}

function changeMonth(step){

const date = new Date(monthPicker.value);

date.setMonth(date.getMonth() + step);

monthPicker.value = date.toISOString().slice(0,7);

updateMonthDisplay();

render();

}

function renderChart(){
    const selectedMonth = monthPicker.value;
    const sortedMonths = Object.keys(data).sort();
    
    const totals = [];
    const diffs = [];
    const diffColors = [];

    sortedMonths.forEach((month,i)=>{
        totals.push(getTotal(month));

        if(i===0){
            diffs.push(0);
            diffColors.push("#999");
        } else {
            const diff = getTotal(month) - getTotal(sortedMonths[i-1]);
            diffs.push(diff);
            diffColors.push(diff>=0 ? "#2ecc71" : "#e74c3c");
        }
    });


    const ctx=document.getElementById("chart").getContext("2d");
    if(window.myChart) window.myChart.destroy();

    window.myChart=new Chart(ctx,{
        type:"bar",
        data:{
            labels:sortedMonths,
            datasets:[
                {
                    label:"Total mensual",
                    data:totals,
                    backgroundColor:"#3498db"
                },
                {
                    label:"Diferencia",
                    data:diffs,
                    backgroundColor:diffColors
                }
            ]
        },
        options:{
            responsive:true,
            plugins:{
                legend:{position:"bottom"}
            },
            scales:{
                y:{beginAtZero:false}
            }
        }
    });
}

monthPicker.addEventListener("change", render);
updateMonthDisplay();
render();
</script>

</body>
</html>
